openapi: 3.1.0
info:
  title: MySchedlr API
  version: 2.0.0
  description: |
    API contract for MySchedlr.

    **Authentication** is handled by AWS Cognito — the backend is a resource server only.
    Clients authenticate directly against the Cognito User Pool using the Amplify SDK,
    then pass the resulting access token as a Bearer token to all protected endpoints.

    Token issuance, refresh, signup, login, and password reset are all performed via
    the Cognito SDK — there are no `/auth/*` endpoints on this server.

servers:
  - url: http://localhost:4000
    description: Local dev

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Cognito access token obtained via Amplify.Auth.signIn() / fetchAuthSession().
        Issued by the tenant-specific Cognito User Pool (RS256, verified via JWKS).

  schemas:
    User:
      type: object
      properties:
        id:        { type: string, description: Cognito sub (UUID) }
        role:      { type: string, enum: [admin, user] }
        tenantId:  { type: string }
        createdAt: { type: string, format: date-time }

    Error:
      type: object
      properties:
        message: { type: string }
        code:    { type: string }

security:
  - BearerAuth: []

paths:
  /health:
    get:
      summary: Health check
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /users/me:
    get:
      summary: Get current user profile
      description: |
        Returns the DynamoDB profile for the authenticated Cognito user.
        A minimal profile is created automatically on first call (lazy provisioning).
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401":
          description: Missing or invalid Cognito access token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

