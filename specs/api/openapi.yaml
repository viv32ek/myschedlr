openapi: 3.1.0
info:
  title: MySchedlr API
  version: 2.0.0
  description: |
    API contract for MySchedlr — update this spec before implementing endpoints.

    ## Authentication
    Authentication is handled by **AWS Cognito**. The backend does NOT
    implement signup or login — clients use the Cognito SDK (Amplify) directly.

    The backend receives a Cognito-issued JWT as a Bearer token, verifies it
    against the Cognito JWKS endpoint using `aws-jwt-verify`, and reads the
    `sub` claim to resolve the user profile from DynamoDB.

    The only backend auth endpoint is `POST /auth/provision`, called once
    after a user's first successful Cognito login to create their DynamoDB
    profile (roles, tenantId, name).

servers:
  - url: http://localhost:4000
    description: Local dev

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT (Cognito)
      description: |
        Cognito access token obtained via Amplify.Auth.signIn() / fetchAuthSession().
        Issued by the tenant-specific Cognito User Pool (RS256, verified via JWKS).

  schemas:
    User:
      type: object
      properties:
        id:        { type: string, description: "Cognito sub — also stored as usr_* in DynamoDB" }
        email:     { type: string, format: email }
        name:      { type: string }
        roles:
          type: array
          items:
            type: string
            enum: [admin, faculty, student]
          minItems: 1
          description: A user may hold multiple roles simultaneously
        createdAt: { type: string, format: date-time }

    Error:
      type: object
      properties:
        message: { type: string }
        code:    { type: string }

security:
  - BearerAuth: []

paths:
  /health:
    get:
      summary: Health check
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /auth/provision:
    post:
      summary: Create DynamoDB profile after first Cognito login
      description: |
        Called by the client immediately after a user's first successful
        Cognito authentication. Creates the user's profile record in DynamoDB
        (name, roles, tenantId). Idempotent — safe to call on every login;
        does nothing if the profile already exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:  { type: string }
                roles:
                  type: array
                  items: { type: string, enum: [admin, faculty, student] }
                  minItems: 1
                  default: [student]
      responses:
        "201":
          description: Profile created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "200":
          description: Profile already exists (idempotent)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401":
          description: Unauthorized

  /users/me:
    get:
      summary: Get current user profile
      description: |
        Returns the DynamoDB profile for the authenticated Cognito user.
        A minimal profile is created automatically on first call (lazy provisioning).
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401":
          description: Missing or invalid Cognito access token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
