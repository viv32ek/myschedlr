version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules

  ui:
    build: ./ui
    ports:
      - "3000:3000"
    env_file: ./ui/.env
    volumes:
      - ./ui:/app
      - /app/node_modules
