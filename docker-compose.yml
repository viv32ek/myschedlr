version: "3.9"

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    env_file: ./backend/.env
    environment:
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
    depends_on:
      - dynamodb-local
    volumes:
      - ./backend:/app
      - /app/node_modules

  ui:
    build: ./ui
    ports:
      - "3001:80"
    env_file: ./ui/.env
    volumes:
      - ./ui:/app
      - /app/node_modules
